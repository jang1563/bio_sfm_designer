name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
      - name: Test
        run: |
          python -m pytest -q
      - name: Public manifest and surface
        run: |
          python scripts/check_public_manifest.py
      - name: Public history
        run: |
          python scripts/check_public_history.py
      - name: Public release readiness
        run: |
          python -m bio_sfm_designer.experiments.public_release_readiness \
            --repo-visibility public \
            --tracked-only \
            --include-results \
            --check-git-status
